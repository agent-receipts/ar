version: 2
updates:
  - package-ecosystem: npm
    directory: /sdk/ts
    schedule:
      interval: weekly
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /sdk/go
    schedule:
      interval: weekly
    groups:
      go:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /mcp-proxy
    schedule:
      interval: weekly
    groups:
      go:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /cross-sdk-tests
    schedule:
      interval: weekly
    groups:
      go:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /sdk/py
    schedule:
      interval: weekly
    groups:
      pip:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
