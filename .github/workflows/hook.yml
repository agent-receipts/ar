name: "CI: hook"

on:
  push:
    branches: [main]
    paths:
      - "hook/**"
      - "sdk/go/**"
  pull_request:
    branches: [main]
    paths:
      - "hook/**"
      - "sdk/go/**"

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: hook
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./cmd/agent-receipts-hook

      - name: Test
        run: go test ./... -v
