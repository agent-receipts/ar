name: "CI: scripts lint"

# Lint the repo-root release-gate helpers under scripts/ with ruff. These
# helpers (byte_identity/, schema_conformance/, release_verify/, readme_snippets/)
# are not part of any SDK package, so the SDK lint jobs never see them — without
# this gate, F-class issues (unused imports, undefined names) reach merge unchecked.
# Config lives in scripts/ruff.toml.

on:
  push:
    branches: [main]
    paths: &paths
      - "scripts/**"
      - ".github/workflows/scripts-lint.yml"
  pull_request:
    branches: [main]
    paths: *paths

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - run: uvx ruff@0.15.15 check scripts/
