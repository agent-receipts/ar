name: Publish Go Modules

on:
  release:
    # `prereleased` covers alpha/beta tags (e.g. sdk/go/v0.11.0-alpha.1);
    # `published` covers stable releases. Note: Go modules don't strictly
    # need this workflow to be installable — the Go proxy auto-indexes on
    # tag push. The workflow runs post-tag validation (rejects local
    # replace directives, verifies module path) which we want for both
    # stable and prerelease tags.
    types: [published, prereleased]

permissions:
  contents: read

jobs:
  sdk-go:
    if: startsWith(github.ref_name, 'sdk/go/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"

      - name: Reject local replace directives
        run: |
          go mod edit -json | python3 -c '
          import json, re, sys
          mod = json.load(sys.stdin)
          for entry in mod.get("Replace") or []:
              path = entry.get("New", {}).get("Path", "")
              if (path in (".", "..") or path.startswith("./") or path.startswith("../")
                  or path.startswith("/") or re.match(r"^[A-Za-z]:[\\\\/]", path)):
                  print(f"::error::go.mod contains a local replace directive ({path}) — remove it before releasing")
                  sys.exit(1)
          '

      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

      - name: Request pkg.go.dev indexing
        run: |
          VERSION="${GITHUB_REF_NAME#sdk/go/v}"
          URL="https://proxy.golang.org/github.com/agent-receipts/ar/sdk/go/@v/v${VERSION}.info"
          succeeded=false
          for attempt in 1 2 3; do
            if curl -fsS "$URL"; then succeeded=true; break; fi
            [[ "$attempt" -lt 3 ]] && sleep 2
          done
          [[ "$succeeded" == "true" ]] || echo "::warning::Failed to request pkg.go.dev indexing after 3 attempts"

  # Release-blocking gate: the just-published Go module must satisfy the code
  # snippets in the READMEs. Runs after sdk-go so the tag is live on the proxy;
  # a drifted snippet turns the release red. (Pre-publish gating isn't possible
  # here — "published" mode needs the artifact to already exist on the proxy.)
  readme-snippets:
    needs: sdk-go
    if: startsWith(github.ref_name, 'sdk/go/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
      - name: Verify published README snippets build
        run: |
          VERSION="${GITHUB_REF_NAME#sdk/go/v}"
          python3 scripts/readme_snippets/check.py \
            --lang go --source published --version "$VERSION" \
            README.md sdk/go/README.md

  hook:
    if: startsWith(github.ref_name, 'hook/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hook
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"

      - name: Reject local replace directives
        run: |
          go mod edit -json | python3 -c '
          import json, re, sys
          mod = json.load(sys.stdin)
          for entry in mod.get("Replace") or []:
              path = entry.get("New", {}).get("Path", "")
              if (path in (".", "..") or path.startswith("./") or path.startswith("../")
                  or path.startswith("/") or re.match(r"^[A-Za-z]:[\\\\/]", path)):
                  print(f"::error::go.mod contains a local replace directive ({path}) — remove it before releasing")
                  sys.exit(1)
          '

      - run: go vet ./...
      - run: go build ./cmd/...
      - run: go test ./...

      - name: Request pkg.go.dev indexing
        run: |
          VERSION="${GITHUB_REF_NAME#hook/v}"
          URL="https://proxy.golang.org/github.com/agent-receipts/ar/hook/@v/v${VERSION}.info"
          succeeded=false
          for attempt in 1 2 3; do
            if curl -fsS "$URL"; then succeeded=true; break; fi
            [[ "$attempt" -lt 3 ]] && sleep 2
          done
          [[ "$succeeded" == "true" ]] || echo "::warning::Failed to request pkg.go.dev indexing after 3 attempts"

  mcp-proxy:
    if: startsWith(github.ref_name, 'mcp-proxy/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-proxy
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"

      - name: Reject local replace directives
        run: |
          go mod edit -json | python3 -c '
          import json, re, sys
          mod = json.load(sys.stdin)
          for entry in mod.get("Replace") or []:
              path = entry.get("New", {}).get("Path", "")
              if (path in (".", "..") or path.startswith("./") or path.startswith("../")
                  or path.startswith("/") or re.match(r"^[A-Za-z]:[\\\\/]", path)):
                  print(f"::error::go.mod contains a local replace directive ({path}) — remove it before releasing")
                  sys.exit(1)
          '

      - run: go vet ./...
      - name: Build with version
        run: |
          VERSION="${GITHUB_REF_NAME#mcp-proxy/}"
          # Validate version stamping on the primary binary, obsigna-mcp
          # (ADR-0033). cmd/mcp-proxy is now the deprecation shim and carries no
          # main.version symbol, so stamping it would no-op silently.
          go build -ldflags "-X main.version=${VERSION}" ./cmd/obsigna-mcp
          go build ./...
      - run: go test ./...

      - name: Request pkg.go.dev indexing
        run: |
          VERSION="${GITHUB_REF_NAME#mcp-proxy/v}"
          URL="https://proxy.golang.org/github.com/agent-receipts/ar/mcp-proxy/@v/v${VERSION}.info"
          succeeded=false
          for attempt in 1 2 3; do
            if curl -fsS "$URL"; then succeeded=true; break; fi
            [[ "$attempt" -lt 3 ]] && sleep 2
          done
          [[ "$succeeded" == "true" ]] || echo "::warning::Failed to request pkg.go.dev indexing after 3 attempts"
