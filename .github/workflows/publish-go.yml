name: Publish Go Modules

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sdk-go:
    if: startsWith(github.ref_name, 'sdk/go/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: sdk/go/go.mod

      - name: Reject local replace directives
        run: |
          go mod edit -json | python3 - <<'PY'
          import json, re, sys
          mod = json.load(sys.stdin)
          for entry in mod.get("Replace") or []:
              path = entry.get("New", {}).get("Path", "")
              if (path in (".", "..") or path.startswith("./") or path.startswith("../")
                  or path.startswith("/") or re.match(r"^[A-Za-z]:[\\\\/]", path)):
                  print(f"::error::go.mod contains a local replace directive ({path}) — remove it before releasing")
                  sys.exit(1)
          PY

      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

      - name: Request pkg.go.dev indexing
        run: |
          VERSION="${GITHUB_REF_NAME#sdk/go/v}"
          URL="https://proxy.golang.org/github.com/agent-receipts/ar/sdk/go/@v/v${VERSION}.info"
          succeeded=false
          for attempt in 1 2 3; do
            if curl -fsS "$URL"; then succeeded=true; break; fi
            [[ "$attempt" -lt 3 ]] && sleep 2
          done
          [[ "$succeeded" == "true" ]] || echo "::warning::Failed to request pkg.go.dev indexing after 3 attempts"

  mcp-proxy:
    if: startsWith(github.ref_name, 'mcp-proxy/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-proxy
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: mcp-proxy/go.mod

      - name: Reject local replace directives
        run: |
          go mod edit -json | python3 - <<'PY'
          import json, re, sys
          mod = json.load(sys.stdin)
          for entry in mod.get("Replace") or []:
              path = entry.get("New", {}).get("Path", "")
              if (path in (".", "..") or path.startswith("./") or path.startswith("../")
                  or path.startswith("/") or re.match(r"^[A-Za-z]:[\\\\/]", path)):
                  print(f"::error::go.mod contains a local replace directive ({path}) — remove it before releasing")
                  sys.exit(1)
          PY

      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

      - name: Request pkg.go.dev indexing
        run: |
          VERSION="${GITHUB_REF_NAME#mcp-proxy/v}"
          URL="https://proxy.golang.org/github.com/agent-receipts/ar/mcp-proxy/@v/v${VERSION}.info"
          succeeded=false
          for attempt in 1 2 3; do
            if curl -fsS "$URL"; then succeeded=true; break; fi
            [[ "$attempt" -lt 3 ]] && sleep 2
          done
          [[ "$succeeded" == "true" ]] || echo "::warning::Failed to request pkg.go.dev indexing after 3 attempts"
