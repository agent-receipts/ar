name: "CI: sdk-go"

on:
  push:
    branches: [main]
    paths:
      - "sdk/go/**"
  pull_request:
    branches: [main]
    paths:
      - "sdk/go/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v
