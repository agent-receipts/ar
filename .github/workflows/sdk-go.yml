name: "CI: sdk-go"

on:
  push:
    branches: [main]
    paths:
      - "sdk/go/**"
      - "cross-sdk-tests/**"
      - "spec/**"
  pull_request:
    branches: [main]
    paths:
      - "sdk/go/**"
      - "cross-sdk-tests/**"
      - "spec/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.22"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v

      - name: Integration tests
        run: go test -tags=integration ./... -v
