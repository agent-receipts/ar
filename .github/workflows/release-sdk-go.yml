name: "Release: sdk-go"

on:
  push:
    tags:
      - "sdk/go/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Deployment environment lets you attach protection rules (required
    # reviewers, wait timer, branch restrictions) to gate who can trigger
    # a release. Configure at:
    # https://github.com/agent-receipts/ar/settings/environments
    environment: release-sdk-go
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"

      - name: Prepare version
        run: |
          VERSION="${GITHUB_REF_NAME#sdk/go/}"
          echo "SDK_GO_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Reject local replace directives
        run: |
          go mod edit -json | python3 -c '
          import json, re, sys
          mod = json.load(sys.stdin)
          for entry in mod.get("Replace") or []:
              path = entry.get("New", {}).get("Path", "")
              if (path in (".", "..") or path.startswith("./") or path.startswith("../")
                  or path.startswith("/") or re.match(r"^[A-Za-z]:[\\\\/]", path)):
                  print(f"::error::go.mod contains a local replace directive ({path}) — remove it before releasing")
                  sys.exit(1)
          '

      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Mark pre-release tags (e.g. v0.9.0-alpha.1) so they don't show
          # up as "latest" on the GitHub Releases page.
          PRERELEASE_ARG=()
          if [[ "${SDK_GO_VERSION}" == *-* ]]; then
            PRERELEASE_ARG+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "sdk-go ${SDK_GO_VERSION}" \
            --generate-notes \
            "${PRERELEASE_ARG[@]}"

  # Gate #1: the just-published module must satisfy the code snippets in the
  # READMEs. Runs after release so the tag is live on the Go proxy; a drifted
  # snippet turns the release red.
  readme-snippets:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
      - name: Verify published README snippets build
        run: |
          VERSION="${GITHUB_REF_NAME#sdk/go/v}"
          python3 scripts/readme_snippets/check.py \
            --lang go --source published --version "$VERSION" \
            README.md sdk/go/README.md

  # Gate #2: verify the Go proxy resolved exactly the tagged version.
  # Asserts version identity: the module the proxy serves is the one we tagged,
  # not a redirect or stale cache entry.
  release-verify:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
      - name: Verify published version identity (Gate #2)
        run: |
          VERSION="${GITHUB_REF_NAME#sdk/go/v}"
          python3 scripts/release_verify/check.py --lang go --version "$VERSION"
      - name: Run unit tests for release-verify gate
        run: python3 scripts/release_verify/test_check.py

  # Gate #6: the receipt the just-published module emits must validate against
  # the published JSON Schema. Emits via the module fetched from the Go proxy
  # and validates with spec/schema/agent-receipt.schema.json; output that
  # drifts from the schema turns the release red.
  schema-conformance:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - run: python3 -m pip install --quiet "jsonschema[format-nongpl]==4.26.0"
      - name: Verify emitted receipt conforms to schema (Gate #6)
        run: |
          VERSION="${GITHUB_REF_NAME#sdk/go/v}"
          python3 scripts/schema_conformance/check.py --lang go --version "$VERSION"
      - name: Run unit tests for schema-conformance gate
        run: python3 scripts/schema_conformance/test_check.py

  # Gate #7: the canonical JSON the just-published module produces must be
  # byte-identical to the shared canonicalisation vectors (and therefore to the
  # other SDKs). Runs the vectors through the module fetched from the Go proxy
  # and compares byte-for-byte; any divergence turns the release red.
  byte-identity:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Verify canonicalisation is byte-identical to the vectors (Gate #7)
        run: |
          VERSION="${GITHUB_REF_NAME#sdk/go/v}"
          python3 scripts/byte_identity/check.py --lang go --version "$VERSION"
      - name: Run unit tests for byte-identity gate
        run: python3 scripts/byte_identity/test_check.py

  # Gate #10: every dependency installed into the published artifact must be
  # declared in go.mod or recorded in the gate's allowlist with a justification.
  # An undeclared, un-allow-listed "eager" dependency turns the release red.
  # Manifest-vs-manifest comparison — no network, no module download.
  dependency-manifest:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Verify installed deps match declared deps (Gate #10)
        run: python3 scripts/dependency_manifest/check.py --lang go
      - name: Run unit tests for dependency-manifest gate
        run: python3 scripts/dependency_manifest/test_check.py
