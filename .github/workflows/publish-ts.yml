name: Publish SDK (TypeScript) to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

defaults:
  run:
    working-directory: sdk/ts

jobs:
  publish:
    if: startsWith(github.ref_name, 'sdk-ts-v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: sdk/ts/pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Verify release tag matches package.json version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#sdk-ts-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Release tag sdk-ts-v${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
