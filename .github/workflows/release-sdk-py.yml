name: "Release: sdk-py"

on:
  push:
    tags:
      - "sdk-py-v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Deployment environment lets you attach protection rules (required
    # reviewers, wait timer, branch restrictions) to gate who can trigger
    # a release. Configure at:
    # https://github.com/agent-receipts/ar/settings/environments
    environment: release-sdk-py
    defaults:
      run:
        working-directory: sdk/py
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"

      - name: Prepare version
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-py-v}"
          echo "SDK_PY_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Verify release tag matches pyproject.toml version
        run: |
          PY_VERSION=$(uv run python -c "
          import tomllib, pathlib
          p = pathlib.Path('pyproject.toml')
          print(tomllib.loads(p.read_text())['project']['version'])
          ")
          if [ "$PY_VERSION" != "$SDK_PY_VERSION" ]; then
            echo "::error::Release tag sdk-py-v${SDK_PY_VERSION} does not match pyproject.toml version ${PY_VERSION}"
            exit 1
          fi

      - run: uv sync --frozen --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest

      - run: uv build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Mark pre-release tags as GitHub pre-releases so they don't show
          # up as "latest" on the GitHub Releases page.
          # Covers SemVer pre-releases (e.g. v0.9.0-beta.1, *-*) and PEP 440
          # pre-release suffixes (e.g. v0.9.0a1, v0.9.0rc1 — matched by [abc][0-9]).
          # Skip creation if the release already exists so reruns after a
          # failed publish step don't abort before reaching PyPI.
          PRERELEASE_ARG=()
          CORE="${SDK_PY_VERSION%%+*}"
          if [[ "$CORE" == *-* ]] || [[ "$CORE" =~ [0-9]+(a|b|rc)[0-9]+$ ]]; then
            PRERELEASE_ARG+=(--prerelease)
          fi
          if ! gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "sdk-py ${SDK_PY_VERSION}" \
              --generate-notes \
              "${PRERELEASE_ARG[@]}"
          fi

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: sdk/py/dist/

  # Gate #1: the just-published package must satisfy the code snippets in the
  # READMEs. Runs after publish so the version is live on PyPI; a drifted
  # snippet turns the release red.
  readme-snippets:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Verify published README snippets type-check
        run: python3 scripts/readme_snippets/check.py --lang py --source published README.md sdk/py/README.md

  # Gate #2: verify PyPI resolved exactly the tagged version.
  # Asserts version identity: `pip install obsigna==X.Y.Z` returns
  # exactly X.Y.Z, not a yank-substitute or nearest match.
  release-verify:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Verify published version identity (Gate #2)
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-py-v}"
          python3 scripts/release_verify/check.py --lang py --version "$VERSION"
      - name: Run unit tests for release-verify gate
        run: python3 scripts/release_verify/test_check.py

  # Gate #6: the receipt the just-published package emits must validate against
  # the published JSON Schema. Emits via the package installed from PyPI and
  # validates with spec/schema/agent-receipt.schema.json; output that drifts
  # from the schema turns the release red.
  schema-conformance:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - run: python3 -m pip install --quiet "jsonschema[format-nongpl]==4.26.0"
      - name: Verify emitted receipt conforms to schema (Gate #6)
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-py-v}"
          python3 scripts/schema_conformance/check.py --lang py --version "$VERSION"
      - name: Run unit tests for schema-conformance gate
        run: python3 scripts/schema_conformance/test_check.py

  # Gate #7: the canonical JSON the just-published package produces must be
  # byte-identical to the shared canonicalisation vectors (and therefore to the
  # other SDKs). Runs the vectors through the package installed from PyPI and
  # compares byte-for-byte; any divergence turns the release red.
  byte-identity:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Verify canonicalisation is byte-identical to the vectors (Gate #7)
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-py-v}"
          python3 scripts/byte_identity/check.py --lang py --version "$VERSION"
      - name: Run unit tests for byte-identity gate
        run: python3 scripts/byte_identity/test_check.py

  # Gate #10: every dependency installed into the published artifact must be
  # declared in pyproject.toml or recorded in the gate's allowlist with a
  # justification. An undeclared, un-allow-listed "eager" dependency turns the
  # release red. Manifest-vs-manifest comparison — no network, no install.
  dependency-manifest:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Verify installed deps match declared deps (Gate #10)
        run: python3 scripts/dependency_manifest/check.py --lang py
      - name: Run unit tests for dependency-manifest gate
        run: python3 scripts/dependency_manifest/test_check.py

  # Gate #8: the just-published package and the latest released daemon must
  # declare intersecting protocol-version ranges and complete a live handshake.
  # Reads the SDK's declared range from the package installed from PyPI and the
  # daemon's spoken range from the released daemon tarball, asserts they
  # intersect, then boots the daemon and emits one event through the published
  # SDK; a pair that cannot talk turns the release red. Skips when no daemon has
  # been released yet (nothing to pair against).
  daemon-protocol:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Verify daemon ↔ SDK protocol compatibility (Gate #8)
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-py-v}"
          python3 scripts/daemon_protocol/check.py \
            --sdk-lang py --sdk-version "$VERSION" --daemon-version latest
      - name: Run unit tests for daemon-protocol gate
        run: python3 scripts/daemon_protocol/test_check.py
