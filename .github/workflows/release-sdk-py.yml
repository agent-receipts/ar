name: "Release: sdk-py"

on:
  push:
    tags:
      - "sdk-py-v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Deployment environment lets you attach protection rules (required
    # reviewers, wait timer, branch restrictions) to gate who can trigger
    # a release. Configure at:
    # https://github.com/agent-receipts/ar/settings/environments
    environment: release-sdk-py
    defaults:
      run:
        working-directory: sdk/py
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - name: Prepare version
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-py-v}"
          echo "SDK_PY_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Verify release tag matches pyproject.toml version
        run: |
          PY_VERSION=$(uv run python -c "
          import tomllib, pathlib
          p = pathlib.Path('pyproject.toml')
          print(tomllib.loads(p.read_text())['project']['version'])
          ")
          if [ "$PY_VERSION" != "$SDK_PY_VERSION" ]; then
            echo "::error::Release tag sdk-py-v${SDK_PY_VERSION} does not match pyproject.toml version ${PY_VERSION}"
            exit 1
          fi

      - run: uv sync --frozen --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest

      - run: uv build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Mark pre-release tags as GitHub pre-releases so they don't show
          # up as "latest" on the GitHub Releases page.
          # Covers SemVer pre-releases (e.g. v0.9.0-beta.1, *-*) and PEP 440
          # pre-release suffixes (e.g. v0.9.0a1, v0.9.0rc1 — matched by [abc][0-9]).
          # Skip creation if the release already exists so reruns after a
          # failed publish step don't abort before reaching PyPI.
          PRERELEASE_ARG=()
          CORE="${SDK_PY_VERSION%%+*}"
          if [[ "$CORE" == *-* ]] || [[ "$CORE" =~ [0-9]+(a|b|rc)[0-9]+$ ]]; then
            PRERELEASE_ARG+=(--prerelease)
          fi
          if ! gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "sdk-py ${SDK_PY_VERSION}" \
              --generate-notes \
              "${PRERELEASE_ARG[@]}"
          fi

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: sdk/py/dist/

  # Gate #1: the just-published package must satisfy the code snippets in the
  # READMEs. Runs after publish so the version is live on PyPI; a drifted
  # snippet turns the release red.
  readme-snippets:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Verify published README snippets type-check
        run: python3 scripts/readme_snippets/check.py --lang py --source published README.md sdk/py/README.md

  # Gate #2: verify PyPI resolved exactly the tagged version.
  # Asserts version identity: `pip install agent-receipts==X.Y.Z` returns
  # exactly X.Y.Z, not a yank-substitute or nearest match.
  release-verify:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Verify published version identity (Gate #2)
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-py-v}"
          python3 scripts/release_verify/check.py --lang py --version "$VERSION"
      - name: Run unit tests for release-verify gate
        run: python3 scripts/release_verify/test_check.py

  # Gate #6: the receipt the just-published package emits must validate against
  # the published JSON Schema. Emits via the package installed from PyPI and
  # validates with spec/schema/agent-receipt.schema.json; output that drifts
  # from the schema turns the release red.
  schema-conformance:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - run: python3 -m pip install --quiet "jsonschema[format-nongpl]==4.26.0"
      - name: Verify emitted receipt conforms to schema (Gate #6)
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-py-v}"
          python3 scripts/schema_conformance/check.py --lang py --version "$VERSION"
      - name: Run unit tests for schema-conformance gate
        run: python3 scripts/schema_conformance/test_check.py
