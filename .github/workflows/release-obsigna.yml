name: "Release: obsigna"

on:
  push:
    tags:
      - "obsigna/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Deployment environment lets you attach protection rules (required
    # reviewers, wait timer, branch restrictions) to gate who can trigger
    # a release and push to the Homebrew tap. Configure at:
    # https://github.com/agent-receipts/ar/settings/environments
    environment: release-daemon
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          # Pin to daemon/go.mod's toolchain (ADR-0031): the release build must
          # use the exact compiler the reproducible-attestation gate rebuilds
          # with, not a floating latest 1.26.x.
          go-version-file: daemon/go.mod

      # GoReleaser can't parse the prefixed tag `obsigna/vX.Y.Z` as semver.
      # Create a local lightweight `vX.Y.Z` tag at the same commit so
      # GoReleaser computes a clean .Version; this tag is never pushed.
      - name: Prepare version
        run: |
          VERSION="${GITHUB_REF_NAME#obsigna/}"
          echo "OBSIGNA_VERSION=${VERSION}" >> "$GITHUB_ENV"
          git tag "${VERSION}" HEAD

      # Single GoReleaser run: builds, archives, pushes Homebrew formula.
      # Release creation + binary upload happen in the next step with `gh`
      # so the same dist/ artifacts (and therefore matching SHA256s) are
      # used for both the formula and the release assets — re-running
      # GoReleaser would produce different tar hashes.
      - name: Build and publish Homebrew formula
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=validate,announce
          workdir: daemon
        env:
          GORELEASER_CURRENT_TAG: ${{ env.OBSIGNA_VERSION }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Disable the Go workspace so builds resolve from daemon/go.mod
          # (published sdk/go) rather than the in-tree ./sdk/go module.
          GOWORK: off

      - name: Create GitHub release with binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Mark pre-release tags (e.g. v0.8.0-alpha.1) so they don't show
          # up as "latest" on the GitHub Releases page.
          PRERELEASE_ARG=()
          if [[ "${OBSIGNA_VERSION}" == *-* ]]; then
            PRERELEASE_ARG+=(--prerelease)
          fi
          # Create the release if it doesn't already exist (e.g. pre-created
          # for release notes), then upload assets either way.
          # If it already exists, normalise title and prerelease flag — a
          # pre-created release may be missing --prerelease, which would cause
          # a pre-release tag to appear as the latest stable release.
          if gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "obsigna ${OBSIGNA_VERSION}" \
              "${PRERELEASE_ARG[@]}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "obsigna ${OBSIGNA_VERSION}" \
              --generate-notes \
              "${PRERELEASE_ARG[@]}"
          fi
          gh release upload "${GITHUB_REF_NAME}" \
            daemon/dist/*.tar.gz \
            daemon/dist/checksums.txt \
            --clobber

  # Gate #8: the just-released daemon must declare a protocol-version range that
  # intersects each released SDK's declared range, and complete a live
  # handshake with it. For each SDK language it reads the SDK's declared range
  # from the latest published package and the daemon's spoken range from the
  # tarball just uploaded to this release, asserts they intersect, then boots
  # the released daemon and emits one event through the published SDK; a pair
  # that cannot talk turns the release red. A language whose SDK has not been
  # published yet is skipped (nothing to pair against).
  daemon-protocol:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        lang: [go, ts, py]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - if: matrix.lang == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: daemon/go.mod
      - if: matrix.lang == 'ts'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Verify daemon ↔ SDK protocol compatibility (Gate #8)
        run: |
          VERSION="${GITHUB_REF_NAME#obsigna/v}"
          python3 scripts/daemon_protocol/check.py \
            --sdk-lang ${{ matrix.lang }} --sdk-version latest --daemon-version "$VERSION"
      - name: Run unit tests for daemon-protocol gate
        run: python3 scripts/daemon_protocol/test_check.py

  # Gate B (release side, ADR-0031): the attestation claim is that auditors can
  # independently rebuild obsigna-daemon and match a published hash. Prove it on
  # every release — independently rebuild the binary with the same deterministic
  # flags GoReleaser used, assert its sha256 equals the binary inside the just-
  # released archive, then publish that hash (a .sha256 asset + a notes line) as
  # the daemon's known-good attestation value. A mismatch means the build is not
  # reproducible, so we refuse to publish a hash and fail the release.
  reproducible-attest:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: daemon/go.mod
      - name: Rebuild obsigna-daemon and match the released artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#obsigna/v}"   # e.g. 0.20.0-alpha.1 (no leading v)
          asset="obsigna_${VERSION}_linux_amd64.tar.gz"

          # 1) Hash obsigna-daemon as shipped, from the archive uploaded by the
          #    release job above.
          mkdir -p released
          gh release download "${GITHUB_REF_NAME}" --pattern "$asset" --dir released
          tar -xzf "released/${asset}" -C released
          released_hash="$(sha256sum released/obsigna-daemon | awk '{print $1}')"

          # 2) Independent clean rebuild via the shared reproducible-build script
          #    (the same one Gate B uses), so the release rebuild and the PR gate
          #    can't drift. GOWORK=off resolves the published sdk/go rather than
          #    the in-tree workspace, matching the release build; GOOS/GOARCH pin
          #    the linux/amd64 artifact. The script keeps CGO off, -trimpath, and
          #    -buildvcs=false in lockstep with daemon/.goreleaser.yaml.
          ( cd daemon && GOWORK=off go mod download )
          GOWORK=off GOOS=linux GOARCH=amd64 \
            daemon/scripts/reproducible-build.sh daemon /tmp/obsigna-daemon-rebuild "${VERSION}"
          rebuilt_hash="$(sha256sum /tmp/obsigna-daemon-rebuild | awk '{print $1}')"

          echo "released sha256: $released_hash"
          echo "rebuilt  sha256: $rebuilt_hash"
          if [ "$released_hash" != "$rebuilt_hash" ]; then
            echo "::error::Released obsigna-daemon (linux/amd64) does not match an independent clean rebuild ($released_hash vs $rebuilt_hash). The build is not reproducible; refusing to publish an attestation hash."
            exit 1
          fi

          # 3) Publish the known-good hash: a .sha256 asset and a release-notes
          #    line. The notes append is guarded by a marker so re-runs don't
          #    duplicate it.
          hashfile="obsigna-daemon-linux-amd64.sha256"
          echo "${released_hash}  obsigna-daemon" > "$hashfile"
          gh release upload "${GITHUB_REF_NAME}" "$hashfile" --clobber

          marker="<!-- obsigna-daemon-attestation -->"
          notes="$(gh release view "${GITHUB_REF_NAME}" --json body -q .body)"
          if ! printf '%s' "$notes" | grep -qF "$marker"; then
            printf '%s\n\n%s\n**Reproducible build (ADR-0031):** linux/amd64 `obsigna-daemon` sha256 `%s` — independently rebuilt from source and matched byte-for-byte. Rebuild with `GOTOOLCHAIN=go1.26.1 GOWORK=off CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -buildvcs=false -ldflags "-s -w -X main.version=v%s" ./cmd/obsigna-daemon`.\n' \
              "$notes" "$marker" "$released_hash" "$VERSION" | gh release edit "${GITHUB_REF_NAME}" --notes-file -
          fi
