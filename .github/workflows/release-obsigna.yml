name: "Release: obsigna"

on:
  push:
    tags:
      - "obsigna/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Deployment environment lets you attach protection rules (required
    # reviewers, wait timer, branch restrictions) to gate who can trigger
    # a release and push to the Homebrew tap. Configure at:
    # https://github.com/agent-receipts/ar/settings/environments
    environment: release-daemon
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          # Pin to daemon/go.mod's toolchain (ADR-0031): the release build must
          # use the exact compiler the reproducible-attestation gate rebuilds
          # with, not a floating latest 1.26.x.
          go-version-file: daemon/go.mod

      # GoReleaser can't parse the prefixed tag `obsigna/vX.Y.Z` as semver.
      # Create a local lightweight `vX.Y.Z` tag at the same commit so
      # GoReleaser computes a clean .Version; this tag is never pushed.
      - name: Prepare version
        run: |
          VERSION="${GITHUB_REF_NAME#obsigna/}"
          echo "OBSIGNA_VERSION=${VERSION}" >> "$GITHUB_ENV"
          git tag "${VERSION}" HEAD

      # Single GoReleaser run: builds, archives, pushes Homebrew formula.
      # Release creation + binary upload happen in the next step with `gh`
      # so the same dist/ artifacts (and therefore matching SHA256s) are
      # used for both the formula and the release assets — re-running
      # GoReleaser would produce different tar hashes.
      - name: Build and publish Homebrew formula
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=validate,announce
          workdir: daemon
        env:
          GORELEASER_CURRENT_TAG: ${{ env.OBSIGNA_VERSION }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Disable the Go workspace so builds resolve from daemon/go.mod
          # (published sdk/go) rather than the in-tree ./sdk/go module.
          GOWORK: off

      - name: Create GitHub release with binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Mark pre-release tags (e.g. v0.8.0-alpha.1) so they don't show
          # up as "latest" on the GitHub Releases page.
          PRERELEASE_ARG=()
          if [[ "${OBSIGNA_VERSION}" == *-* ]]; then
            PRERELEASE_ARG+=(--prerelease)
          fi
          # Create the release if it doesn't already exist (e.g. pre-created
          # for release notes), then upload assets either way.
          # If it already exists, normalise title and prerelease flag — a
          # pre-created release may be missing --prerelease, which would cause
          # a pre-release tag to appear as the latest stable release.
          if gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "obsigna ${OBSIGNA_VERSION}" \
              "${PRERELEASE_ARG[@]}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "obsigna ${OBSIGNA_VERSION}" \
              --generate-notes \
              "${PRERELEASE_ARG[@]}"
          fi
          gh release upload "${GITHUB_REF_NAME}" \
            daemon/dist/*.tar.gz \
            daemon/dist/checksums.txt \
            --clobber

  # Gate #8: the just-released daemon must declare a protocol-version range that
  # intersects each released SDK's declared range, and complete a live
  # handshake with it. For each SDK language it reads the SDK's declared range
  # from the latest published package and the daemon's spoken range from the
  # tarball just uploaded to this release, asserts they intersect, then boots
  # the released daemon and emits one event through the published SDK; a pair
  # that cannot talk turns the release red. A language whose SDK has not been
  # published yet is skipped (nothing to pair against).
  daemon-protocol:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        lang: [go, ts, py]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - if: matrix.lang == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: daemon/go.mod
      - if: matrix.lang == 'ts'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Verify daemon ↔ SDK protocol compatibility (Gate #8)
        run: |
          VERSION="${GITHUB_REF_NAME#obsigna/v}"
          python3 scripts/daemon_protocol/check.py \
            --sdk-lang ${{ matrix.lang }} --sdk-version latest --daemon-version "$VERSION"
      - name: Run unit tests for daemon-protocol gate
        run: python3 scripts/daemon_protocol/test_check.py

  # Gate B (release side, ADR-0031/0033/0034/0035/0036): the attestation claim is
  # that auditors can independently rebuild each primary toolset binary and match
  # a published hash. With the trains folded into one (ADR-0034 PR 2), prove it
  # for the whole toolset in a single job — the five primary binaries
  # (obsigna-daemon, obsigna, obsigna-mcp, obsigna-collector, obsigna-hook) now
  # ship in one umbrella archive, so download+extract it once, then for each
  # binary independently rebuild with the same deterministic flags GoReleaser
  # used, assert its sha256 equals the shipped binary, publish a .sha256 asset,
  # and append one consolidated attestation block to the release notes. Any
  # mismatch fails the release. (The four deprecation shims are not attested —
  # matching the pre-consolidation per-train behaviour.) Running every binary in
  # one job rather than a matrix keeps the read-modify-write of the release notes
  # serial, so parallel jobs can't clobber each other's appends.
  reproducible-attest:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          # All five toolset modules pin the same go 1.26.1 toolchain, so one
          # setup-go (keyed off daemon/go.mod) is the exact compiler every
          # rebuild needs.
          go-version-file: daemon/go.mod
      - name: Rebuild each toolset binary and match the released archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#obsigna/v}"   # e.g. 0.25.0-alpha.1 (no leading v)
          asset="obsigna_${VERSION}_linux_amd64.tar.gz"

          # Download + extract the umbrella archive once; every primary binary is
          # attested out of this single tarball uploaded by the release job above.
          mkdir -p released
          gh release download "${GITHUB_REF_NAME}" --pattern "$asset" --dir released
          tar -xzf "released/${asset}" -C released

          : > /tmp/attest-lines.txt

          # Rebuild one primary binary and assert it matches the shipped bytes.
          #   $1 module dir | $2 binary | $3 ADR | $4 main pkg
          #   $5 stamp ("version" to stamp -X main.version, else unstamped — the
          #            obsigna CLI ships with -s -w only).
          # The one shared scripts/reproducible-build.sh rebuilds every binary
          # with GOWORK=off (published deps, not the in-tree workspace) and the
          # CGO-off/-trimpath/-buildvcs=false flags kept in lockstep with
          # daemon/.goreleaser.yaml; it takes the main pkg as an explicit arg so
          # every module's binary attests through the same script.
          attest() {
            module="$1"; binary="$2"; adr="$3"; cmd="$4"; stamp="$5"
            echo "=== attesting ${binary} (${module}, ${adr}) ==="
            released_hash="$(sha256sum "released/${binary}" | awk '{print $1}')"

            ( cd "$module" && GOWORK=off go mod download )
            if [ "$stamp" = version ]; then ver="$VERSION"; else ver=""; fi
            GOWORK=off GOOS=linux GOARCH=amd64 \
              scripts/reproducible-build.sh "$module" "/tmp/${binary}-rebuild" "$cmd" "$ver"
            rebuilt_hash="$(sha256sum "/tmp/${binary}-rebuild" | awk '{print $1}')"

            echo "released sha256: $released_hash"
            echo "rebuilt  sha256: $rebuilt_hash"
            if [ "$released_hash" != "$rebuilt_hash" ]; then
              echo "::error::Released ${binary} (linux/amd64) does not match an independent clean rebuild ($released_hash vs $rebuilt_hash). The build is not reproducible; refusing to publish an attestation hash."
              exit 1
            fi

            # Publish the per-binary known-good hash as a .sha256 asset.
            hashfile="${binary}-linux-amd64.sha256"
            echo "${released_hash}  ${binary}" > "$hashfile"
            gh release upload "${GITHUB_REF_NAME}" "$hashfile" --clobber

            # Derive the exact toolchain from the module's go.mod so the published
            # rebuild recipe can't drift from the compiler CI actually used.
            toolchain="$(cd "$module" && go mod edit -json | python3 -c 'import json,sys; m=json.load(sys.stdin); print(m.get("Toolchain") or "go"+m["Go"])')"
            if [ "$stamp" = version ]; then
              ldflags="-s -w -X main.version=v${VERSION}"
            else
              ldflags="-s -w"
            fi
            printf -- '- linux/amd64 `%s` (%s) sha256 `%s` — rebuild with `cd %s && GOTOOLCHAIN=%s GOWORK=off CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -buildvcs=false -ldflags "%s" %s`\n' \
              "$binary" "$adr" "$released_hash" "$module" "$toolchain" "$ldflags" "$cmd" >> /tmp/attest-lines.txt
          }

          attest daemon    obsigna-daemon    ADR-0031 ./cmd/obsigna-daemon    version
          attest daemon    obsigna           ADR-0034 ./cmd/obsigna           none
          attest mcp-proxy obsigna-mcp       ADR-0033 ./cmd/obsigna-mcp       version
          attest collector obsigna-collector ADR-0035 ./cmd/obsigna-collector version
          attest hook      obsigna-hook      ADR-0036 ./cmd/obsigna-hook      version

          # One consolidated attestation block, marker-guarded so re-runs don't
          # duplicate it.
          marker="<!-- obsigna-toolset-attestation -->"
          notes="$(gh release view "${GITHUB_REF_NAME}" --json body -q .body)"
          if ! printf '%s' "$notes" | grep -qF "$marker"; then
            {
              printf '%s\n\n%s\n' "$notes" "$marker"
              printf '**Reproducible build (ADR-0031/0034):** every primary toolset binary below was independently rebuilt from source and matched the released linux/amd64 archive byte-for-byte (the attestation scheme is ADR-0031, consolidated onto one train by ADR-0034; each binary cites its own ADR below).\n\n'
              cat /tmp/attest-lines.txt
            } | gh release edit "${GITHUB_REF_NAME}" --notes-file -
          fi
