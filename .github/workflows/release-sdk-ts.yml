name: "Release: sdk-ts"

on:
  push:
    tags:
      - "sdk-ts-v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Deployment environment lets you attach protection rules (required
    # reviewers, wait timer, branch restrictions) to gate who can trigger
    # a release. Configure at:
    # https://github.com/agent-receipts/ar/settings/environments
    environment: release-sdk-ts
    defaults:
      run:
        working-directory: sdk/ts
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: sdk/ts/pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"

      - name: Prepare version
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-ts-v}"
          echo "SDK_TS_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Verify release tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "$SDK_TS_VERSION" ]; then
            echo "::error::Release tag sdk-ts-v${SDK_TS_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run build
      - run: pnpm run test

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Mark pre-release tags (e.g. v0.9.0-alpha.1) so they don't show
          # up as "latest" on the GitHub Releases page.
          # Skip creation if the release already exists so reruns after a
          # failed publish step don't abort before reaching npm.
          PRERELEASE_ARG=()
          if [[ "${SDK_TS_VERSION}" == *-* ]]; then
            PRERELEASE_ARG+=(--prerelease)
          fi
          if ! gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "sdk-ts ${SDK_TS_VERSION}" \
              --generate-notes \
              "${PRERELEASE_ARG[@]}"
          fi

      - name: Determine npm dist-tag
        id: dist_tag
        shell: bash
        run: |
          CORE="${SDK_TS_VERSION%%+*}"
          if [[ "$CORE" == *-* ]]; then
            PRE="${CORE#*-}"
            if [[ "$PRE" =~ ^([A-Za-z]+) ]]; then
              TAG_NAME="${BASH_REMATCH[1],,}"
            else
              TAG_NAME="prerelease"
            fi
            echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance --tag ${{ steps.dist_tag.outputs.tag }}

  # Gate #1: the just-published npm package must satisfy the code snippets in
  # the READMEs. Runs after publish so the version is live on npm; a drifted
  # snippet turns the release red.
  readme-snippets:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - name: Verify published README snippets type-check
        run: python3 scripts/readme_snippets/check.py --lang ts --source published README.md sdk/ts/README.md

  # Gate #2: verify npm resolved exactly the tagged version.
  # Asserts version identity: `npm install @agnt-rcpt/sdk-ts@X.Y.Z` returns
  # exactly X.Y.Z, not a redirect or dist-tag mismatch.
  release-verify:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - name: Verify published version identity (Gate #2)
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-ts-v}"
          python3 scripts/release_verify/check.py --lang ts --version "$VERSION"
      - name: Run unit tests for release-verify gate
        run: python3 scripts/release_verify/test_check.py

  # Gate #6: the receipt the just-published package emits must validate against
  # the published JSON Schema. Emits via the package installed from npm and
  # validates with spec/schema/agent-receipt.schema.json; output that drifts
  # from the schema turns the release red.
  schema-conformance:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - run: python3 -m pip install --quiet "jsonschema[format-nongpl]==4.26.0"
      - name: Verify emitted receipt conforms to schema (Gate #6)
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-ts-v}"
          python3 scripts/schema_conformance/check.py --lang ts --version "$VERSION"
      - name: Run unit tests for schema-conformance gate
        run: python3 scripts/schema_conformance/test_check.py

  # Gate #7: the canonical JSON the just-published package produces must be
  # byte-identical to the shared canonicalisation vectors (and therefore to the
  # other SDKs). Runs the vectors through the package installed from npm and
  # compares byte-for-byte; any divergence turns the release red.
  byte-identity:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Verify canonicalisation is byte-identical to the vectors (Gate #7)
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-ts-v}"
          python3 scripts/byte_identity/check.py --lang ts --version "$VERSION"
      - name: Run unit tests for byte-identity gate
        run: python3 scripts/byte_identity/test_check.py

  # Gate #8: the just-published package and the latest released daemon must
  # declare intersecting protocol-version ranges and complete a live handshake.
  # Reads the SDK's declared range from the package installed from npm and the
  # daemon's spoken range from the released daemon tarball, asserts they
  # intersect, then boots the daemon and emits one event through the published
  # SDK; a pair that cannot talk turns the release red. Skips when no daemon has
  # been released yet (nothing to pair against).
  daemon-protocol:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Verify daemon ↔ SDK protocol compatibility (Gate #8)
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-ts-v}"
          python3 scripts/daemon_protocol/check.py \
            --sdk-lang ts --sdk-version "$VERSION" --daemon-version latest
      - name: Run unit tests for daemon-protocol gate
        run: python3 scripts/daemon_protocol/test_check.py
