name: "CI: cross-sdk-tests"

on:
  push:
    branches: [main]
    paths:
      - "cross-sdk-tests/**"
      - "sdk/go/**"
      - "spec/**"
  pull_request:
    branches: [main]
    paths:
      - "cross-sdk-tests/**"
      - "sdk/go/**"
      - "spec/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cross-sdk-tests
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Integration tests
        run: go test -tags=integration -v
