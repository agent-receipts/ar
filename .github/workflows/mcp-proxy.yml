name: "CI: mcp-proxy"

on:
  push:
    branches: [main]
    paths:
      - "mcp-proxy/**"
      - "sdk/go/**"
  pull_request:
    branches: [main]
    paths:
      - "mcp-proxy/**"
      - "sdk/go/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-proxy
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./cmd/mcp-proxy

      - name: Test
        run: go test ./... -v

      - name: Integration tests
        run: go test -tags=integration ./... -v

      - name: E2E tests
        run: go test -tags=e2e -v
