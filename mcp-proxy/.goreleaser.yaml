version: 2

project_name: mcp-proxy

# Disable the Go workspace so GoReleaser resolves dependencies strictly from
# mcp-proxy/go.mod (published sdk/go and daemon) rather than the in-tree modules
# wired up by the repo-root go.work. The release attestation (Gate B) rebuilds
# with GOWORK=off too, so the released bytes and the independent rebuild resolve
# the same dependency versions.
env:
  - GOWORK=off

before:
  hooks:
    - go mod download
    - sh -c "cp ../LICENSE LICENSE"

# Reproducible builds are an attestation requirement (ADR-0033), not a nicety:
# auditors must independently rebuild obsigna-mcp and match the published hash.
# Determinism comes from CGO_ENABLED=0 (no host toolchain bytes), -trimpath (no
# absolute $GOPATH/working-dir paths baked in), a patch-pinned toolchain
# (go.mod `toolchain`, consumed via go-version-file in CI), and version stamping
# that derives only from the tag/commit — never wall-clock time. mod_timestamp
# uses the commit timestamp so archive/file mtimes are a function of the commit,
# not of when the release runner happened to build. -buildvcs=false omits git
# VCS stamping: the `before` hook copies LICENSE into mcp-proxy/ (an untracked
# file), which would otherwise flip go's vcs.modified and make the released
# binary differ from a clean rebuild that has no such file. Keep these obsigna-mcp
# flags in lockstep with mcp-proxy/scripts/reproducible-build.sh, the shared
# script the Gate B reproducibility checks rebuild with (ADR-0033).
builds:
  # The proxy, renamed mcp-proxy -> obsigna-mcp (ADR-0033). This is the primary
  # binary, launched in production via `obsigna mcp run` (ADR-0030); the
  # mcp-proxy entry below is a thin deprecation shim that execs into it.
  - id: obsigna-mcp
    main: ./cmd/obsigna-mcp
    binary: obsigna-mcp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -buildvcs=false
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version=v{{.Version}}

  # Deprecation shim: keeps `mcp-proxy <cmd>` working by exec-forwarding to
  # obsigna-mcp with a one-line stderr notice. Ships alongside obsigna-mcp so
  # existing MCP client configs keep running through the rename. It carries no
  # main.version symbol (it never prints its own version — `mcp-proxy --version`
  # forwards to obsigna-mcp), so no -X main.version stamp is applied here; the
  # determinism flags still match obsigna-mcp so the shim is reproducible too.
  - id: mcp-proxy
    main: ./cmd/mcp-proxy
    binary: mcp-proxy
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -buildvcs=false
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - ids:
      - obsigna-mcp
      - mcp-proxy
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

# GitHub release is created outside GoReleaser (against the prefixed tag
# `mcp-proxy/vX.Y.Z`). GoReleaser only builds archives and publishes the
# Homebrew formula; the workflow uploads binaries with `gh`.
release:
  disable: true

brews:
  - name: mcp-proxy
    # `auto` skips the formula bump PR when the release version contains a
    # pre-release suffix (e.g. v0.8.0-alpha.1). The Homebrew tap stays
    # locked to the latest stable mcp-proxy until a non-pre-release tag
    # is cut, so `brew install agent-receipts/tap/mcp-proxy` keeps giving
    # users a non-alpha build during the daemon-backed cutover soak.
    skip_upload: auto
    repository:
      owner: agent-receipts
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      # Push the formula to a feature branch, then open a PR against
      # main. Without an explicit branch, GoReleaser pushes to the
      # default branch (main) and tries to open a main→main PR, which
      # the GitHub API rejects — so the formula sneaks onto main and
      # skips the `brew audit` gate.
      branch: "bump-{{.ProjectName}}-{{.Version}}"
      pull_request:
        enabled: true
        base:
          branch: main
    directory: Formula
    url_template: "https://github.com/agent-receipts/ar/releases/download/mcp-proxy%2Fv{{ .Version }}/{{ .ArtifactName }}"
    homepage: "https://github.com/agent-receipts/ar/tree/main/mcp-proxy"
    description: "MCP proxy with action receipts, policy engine, and intent tracking"
    license: "Apache-2.0"
    commit_author:
      name: agent-receipts-bot
      email: bot@agentreceipts.ai
    commit_msg_template: "chore(mcp-proxy): bump to v{{ .Version }}"
    install: |
      bin.install "obsigna-mcp"
      bin.install "mcp-proxy"
    test: |
      system "#{bin}/obsigna-mcp", "--version"
      system "#{bin}/mcp-proxy", "--version"
    # `brew outdated` and `brew livecheck` use this to detect new releases.
    # The `ar` repo ships multiple taggable components, so we can't use
    # `:github_latest` (which returns repo-wide latest). `:github_releases`
    # scans all releases; regex extracts version from the `mcp-proxy/vX.Y.Z`
    # tag prefix.
    #
    # The caveats are emitted via custom_block so they survive formula
    # regeneration on each release (GoReleaser overwrites the formula file;
    # anything not in custom_block or the named fields would be lost).
    custom_block: |
      conflicts_with "mcp-proxy-alpha", because: "both install the same binaries"

      def caveats
        <<~EOS
          The proxy binary is now obsigna-mcp (was mcp-proxy). The mcp-proxy
          command still works as a thin deprecation shim that forwards to
          obsigna-mcp, so existing MCP client configs keep running — but update
          them to obsigna-mcp (or `obsigna mcp run`) when convenient; the shim
          will be removed in a future release.
        EOS
      end

      livecheck do
        url "https://github.com/agent-receipts/ar"
        strategy :github_releases
        regex(/^mcp-proxy\/v?(\d+(?:\.\d+)+)$/i)
      end

  # Alpha-track formula — updated on every release (stable and pre-release).
  # `brew install agent-receipts/tap/mcp-proxy-alpha` always gives the latest
  # cut; conflicts with the stable formula since both install the same binary.
  - name: mcp-proxy-alpha
    repository:
      owner: agent-receipts
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      branch: "bump-{{.ProjectName}}-alpha-{{.Version}}"
      pull_request:
        enabled: true
        base:
          branch: main
    directory: Formula
    url_template: "https://github.com/agent-receipts/ar/releases/download/mcp-proxy%2Fv{{ .Version }}/{{ .ArtifactName }}"
    homepage: "https://github.com/agent-receipts/ar/tree/main/mcp-proxy"
    description: "MCP proxy with action receipts, policy engine, and intent tracking (alpha/beta track)"
    license: "Apache-2.0"
    commit_author:
      name: agent-receipts-bot
      email: bot@agentreceipts.ai
    commit_msg_template: "chore(mcp-proxy): bump alpha to v{{ .Version }}"
    install: |
      bin.install "obsigna-mcp"
      bin.install "mcp-proxy"
    test: |
      system "#{bin}/obsigna-mcp", "--version"
      system "#{bin}/mcp-proxy", "--version"
    custom_block: |
      conflicts_with "mcp-proxy", because: "both install the same binaries"

      def caveats
        <<~EOS
          This is the alpha/beta track — it tracks every release including pre-releases.
          For stable-only installs use: brew install agent-receipts/tap/mcp-proxy

          The proxy binary is now obsigna-mcp (was mcp-proxy). The mcp-proxy
          command still works as a thin deprecation shim that forwards to
          obsigna-mcp, so existing MCP client configs keep running — but update
          them to obsigna-mcp (or `obsigna mcp run`) when convenient; the shim
          will be removed in a future release.
        EOS
      end

      livecheck do
        url "https://github.com/agent-receipts/ar"
        strategy :github_releases
        regex(/^mcp-proxy\/v?(\d+(?:\.\d+)+(?:-[a-z0-9.]+)?)$/i)
      end
