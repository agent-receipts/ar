version: 2

project_name: agent-receipts-hook

# Disable the Go workspace so GoReleaser resolves dependencies strictly from
# hook/go.mod (published versions) rather than the in-tree ./sdk/go module
# wired up by the repo-root go.work.
env:
  - GOWORK=off

before:
  hooks:
    - go mod download
    - sh -c "cp ../LICENSE LICENSE"

builds:
  - id: agent-receipts-hook
    main: ./cmd/agent-receipts-hook
    binary: agent-receipts-hook
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

# GitHub release is created outside GoReleaser (against the prefixed tag
# `hook/vX.Y.Z`). GoReleaser only builds archives and publishes the
# Homebrew formula; the workflow uploads binaries with `gh`.
release:
  disable: true

brews:
  - name: agent-receipts-hook
    # `auto` skips the formula bump PR when the release version contains a
    # pre-release suffix (e.g. v0.8.0-alpha.1). The Homebrew tap stays
    # locked to the latest stable hook until a non-pre-release tag is cut,
    # so `brew install agent-receipts/tap/agent-receipts-hook` keeps giving
    # users a stable build during alpha/beta soak periods.
    skip_upload: auto
    repository:
      owner: agent-receipts
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      # Push the formula to a feature branch, then open a PR against
      # main. Without an explicit branch, GoReleaser pushes to the
      # default branch (main) and tries to open a main→main PR, which
      # the GitHub API rejects — so the formula sneaks onto main and
      # skips the `brew audit` gate.
      branch: "bump-{{.ProjectName}}-{{.Version}}"
      pull_request:
        enabled: true
        base:
          branch: main
    directory: Formula
    url_template: "https://github.com/agent-receipts/ar/releases/download/hook%2Fv{{ .Version }}/{{ .ArtifactName }}"
    homepage: "https://github.com/agent-receipts/ar/tree/main/hook"
    description: "Claude Code PostToolUse hook that forwards tool-call events to agent-receipts-daemon"
    license: "Apache-2.0"
    commit_author:
      name: agent-receipts-bot
      email: bot@agentreceipts.ai
    commit_msg_template: "chore(hook): bump to v{{ .Version }}"
    install: |
      bin.install "agent-receipts-hook"
    test: |
      system "#{bin}/agent-receipts-hook"
    # `brew outdated` and `brew livecheck` use this to detect new releases.
    # The `ar` repo ships multiple taggable components, so we can't use
    # `:github_latest` (which returns repo-wide latest). `:github_releases`
    # scans all releases; regex extracts version from the `hook/vX.Y.Z`
    # tag prefix.
    custom_block: |
      livecheck do
        url "https://github.com/agent-receipts/ar"
        strategy :github_releases
        regex(/^hook\/v?(\d+(?:\.\d+)+)$/i)
      end
